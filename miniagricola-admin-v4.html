<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniAgricola — Admin</title>
<style>:root{
  --bg:#fff;--bg-s:#f9f9f9;--bg-h:#f5f5f5;--bg-l:#f5f5f0;--card:#fff;
  --text:#1a1a1a;--ts2:#444;--tm:#666;--ts:#888;--tp:#aaa;
  --b:var(--b);--bl:var(--bl);--bm:#ccc;
  --g:var(--g);--g-l:#a0d080;--g-d:#2d4a2d;--hdr:#1a2e1a;
  --danger:var(--danger);--warning:#f59e0b;--w-bg:#fff8e6;
  --purple:#7c3aed;--amber:#d97706;
}
[data-theme="dark"]{
  --bg:#1e1e1e;--bg-s:#252525;--bg-h:#2a2a2a;--bg-l:#161616;--card:#252525;
  --text:#e8e8e8;--ts2:#cccccc;--tm:#aaaaaa;--ts:#888888;--tp:#666666;
  --b:#333333;--bl:#2a2a2a;--bm:#444444;
  --g:#6aaa4a;--g-l:#6aaa4a;--g-d:#1a2e1a;--hdr:#0f1a0f;
  --danger:#ef5350;--warning:#f59e0b;--w-bg:#2a1f00;
  --purple:#9d5cff;--amber:#d97706;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg-l);color:var(--text);font-size:14px;min-height:100vh}
.header{background:#1a1a1a;color:var(--bg);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-weight:700;font-size:15px}
.badge{background:var(--g);color:var(--bg);font-size:11px;padding:2px 10px;border-radius:99px;font-weight:700}
.nav{display:flex;background:var(--bg);border-bottom:1px solid var(--b);overflow-x:auto}
.nav-btn{padding:11px 18px;border:none;background:none;cursor:pointer;font-size:13px;white-space:nowrap;border-bottom:2px solid transparent;color:var(--tm);font-weight:400}
.nav-btn.active{border-bottom-color:var(--g);color:var(--g);font-weight:700}
.body{padding:18px 16px;max-width:860px;margin:0 auto}
.card{background:var(--bg);border-radius:10px;border:1px solid var(--b);margin-bottom:10px;padding:13px 15px}
.row{display:flex;align-items:center;gap:10px}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.btn:hover{opacity:.85}
.btn-p{background:var(--g);color:var(--bg)}
.btn-d{background:var(--danger);color:var(--bg)}
.btn-s{background:var(--bl);color:var(--ts2)}
.btn-g{background:transparent;color:var(--tm);border:1px solid var(--bm)}
.input{width:100%;padding:8px 11px;border-radius:7px;border:1px solid var(--bm);font-size:13px;outline:none}
.input:focus{border-color:var(--g)}
.label{display:block;font-size:11px;font-weight:700;color:var(--ts);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.toggle{width:38px;height:22px;border-radius:99px;border:none;cursor:pointer;position:relative;flex-shrink:0}
.knob{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:var(--bg);transition:left .2s;pointer-events:none}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:12px;padding:22px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.field{margin-bottom:12px}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.sh{font-size:11px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.empty{text-align:center;color:var(--bm);padding:50px 20px;font-size:14px}
</style>
</head>
<body>

<!-- ── SCHERMATA LOGIN ADMIN ──────────────────────────────── -->
<div id="auth-overlay" style="display:none;position:fixed;inset:0;background:linear-gradient(135deg,#1a2e1a 0%,#2d4a2d 100%);z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:var(--bg);border-radius:20px;padding:40px 48px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.4);text-align:center">
    <div style="font-size:40px;margin-bottom:8px">🌱</div>
    <div style="font-size:22px;font-weight:800;color:#1a2e1a;margin-bottom:4px">MiniAgricola</div>
    <div style="font-size:13px;color:var(--ts);margin-bottom:28px">Accesso riservato</div>
    <input id="auth-pwd" type="password" placeholder="Password" autocomplete="off"
      style="width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;box-sizing:border-box;margin-bottom:12px;outline:none;transition:border 0.2s"
      onfocus="this.style.border='2px solid #5c8a3c'"
      onblur="this.style.border='2px solid #e0e0e0'"
      onkeydown="if(event.key==='Enter')doAuth()">
    <button onclick="doAuth()" style="width:100%;padding:14px;background:#5c8a3c;color:var(--bg);border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px">Accedi</button>
    <div id="auth-err" style="display:none;color:var(--danger);font-size:13px;margin-top:4px">⚠️ Password errata</div>
  </div>
</div>

<div class="header">
  <div class="logo">🌱 MINIAGRICOLA <span style="font-weight:300;font-size:13px">admin</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="ss" style="font-size:12px;color:var(--g-l)"></span>
    <button onclick="clearCache();loadAll(true)" style="font-size:11px;background:transparent;border:1px solid #444;color:var(--tp);border-radius:5px;padding:2px 8px;cursor:pointer" title="Forza aggiornamento dati">↺</button>
    <button id="themeBtn" onclick="toggleTheme()" title="Cambia tema" style="background:transparent;border:1px solid var(--ts);color:var(--ts);border-radius:6px;padding:4px 8px;font-size:13px;cursor:pointer">🌙</button>
    <button onclick="doLogout()" title="Esci" style="background:transparent;border:1px solid #888;color:var(--ts);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;margin-right:6px">⎋ Esci</button>
    <span class="badge">GESTIONALE</span>
    <span style="font-size:10px;color:var(--tm);margin-left:6px">v2.09.00</span>
  </div>
</div>
<div class="nav">
  <button class="nav-btn active" id="tab-c" onclick="sw('c')">Catalogo</button>
  <button class="nav-btn" id="tab-cl" onclick="sw('cl')">Clienti</button>
  <button class="nav-btn" id="tab-o" onclick="sw('o')">Ordini</button>
  <button class="nav-btn" id="tab-g" onclick="sw('g')">Gestionale</button>
</div>
<div class="body">
  <div id="v-c"></div>
  <div id="v-cl" style="display:none"></div>
  <div id="v-o" style="display:none"></div>
  <div id="v-g" style="display:none"></div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead">
      <strong id="mtitle" style="font-size:15px"></strong>
      <button class="btn btn-g" onclick="cm()" style="font-size:20px;padding:0 8px;border:none">×</button>
    </div>
    <div id="mbody"></div>
  </div>
</div>
<script>
const API='https://script.google.com/macros/s/AKfycbz5jt_DB2DBRwrkEsY1efzx8J-t_aDH66HKfbl0Q0KVWqNQgN-4jy9tsFKydvu5-sXejQ/exec';
// Schema Sheet (deve corrispondere esattamente alle intestazioni su Google Sheet)
const PROD_H=['id','name','desc','price','avail','unit','qty','preorder','waitTime'];
const CLIE_H=['id','restaurant','contact','phone','email','address','token','createdAt'];
const ORDI_H=['id','clientId','restaurant','itemsJson','total','note','status','createdAt'];

let products=[],clients=[],orders=[],ricette=[],materiePrime=[],editing=null,pfAvail=true;

function pp(v){return typeof v==='number'?v:parseFloat(String(v||0).replace(',','.'))||0;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gid(pre,list){const n=list.map(x=>parseInt((x.id||'').split('-')[1]||0)).filter(Boolean);return `${pre}-${String(n.length?Math.max(...n)+1:1).padStart(4,'0')}`;}
function gtok(){return Math.random().toString(36).substr(2,9).toUpperCase();}
function maps(a){return a?.trim()?`https://maps.google.com/?q=${encodeURIComponent(a)}`:'';} 

// Converte righe Sheet → oggetti usando headers fissi
function rows2obj(rows,headers){
  if(!rows||rows.length<2)return[];
  return rows.slice(1).filter(r=>r[0]!==''&&r[0]!==null&&r[0]!==undefined).map(row=>{
    const o={};headers.forEach((h,i)=>{o[h]=row[i]!==undefined?row[i]:'';});return o;
  });
}
// Converte oggetti → righe usando headers fissi
function obj2rows(objects,headers){
  return [headers,...objects.map(o=>headers.map(h=>{const v=o[h];return v===undefined||v===null?'':v;}))];
}

async function get(action){const r=await fetch(`${API}?action=${action}&t=${Date.now()}`);return r.json();}
async function post(action,data){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,data})});
  return r.json();
}

function ss(s,t){const e=document.getElementById('ss');e.style.color={ok:'#a0d080',loading:'#f59e0b',err:'#e53935'}[s]||'#888';e.textContent=t;}

const CACHE_TTL=5*60*1000;
function saveCache(k,d){try{localStorage.setItem(k,JSON.stringify({ts:Date.now(),data:d}));}catch(e){}}
function loadCache(k){try{const c=JSON.parse(localStorage.getItem(k)||'null');if(c&&(Date.now()-c.ts)<CACHE_TTL)return c.data;}catch(e){}return null;}
function clearCache(){['ma_cp','ma_cr','ma_cm'].forEach(k=>localStorage.removeItem(k));}

async function loadAll(force=false){
  ss('loading','⟳ Sincronizzazione...');
  // Mostra subito dati da cache, poi aggiorna in background
  const cP=!force&&loadCache('ma_cp');
  const cR=!force&&loadCache('ma_cr');
  const cM=!force&&loadCache('ma_cm');
  const cO=!force&&loadCache('ma_co');
  const cC=!force&&loadCache('ma_cc');
  if(cP){products=rows2obj(cP,PROD_H).map(p=>({...p,price:pp(p.price),avail:String(p.avail).toLowerCase()==='true',qty:parseInt(p.qty)||0,preorder:String(p.preorder).toLowerCase()==='true',waitTime:String(p.waitTime||'')}));}
  if(cC){clients=rows2obj(cC,CLIE_H);}
  if(cO){orders=rows2obj(cO,ORDI_H).map(o=>({...o,total:pp(o.total),items:(()=>{try{return JSON.parse(o.itemsJson||'[]');}catch{return[];}})()}));}
  if(cR){const rH=cR[0]?.map(h=>String(h).trim())||[];ricette=cR.slice(1).filter(r=>r[0]).map(row=>{const o={};rH.forEach((h,i)=>{o[h]=row[i]!==undefined?row[i]:'';});return{...o,qtyPerVassoio:pp(o.qtyPerVassoio)};});}
  if(cM){const mH=cM[0]?.map(h=>String(h).trim())||[];materiePrime=cM.slice(1).filter(r=>r[0]).map(row=>{const o={};mH.forEach((h,i)=>{o[h]=row[i]!==undefined?row[i]:'';});return{...o,qtaAcquistata:pp(o.qtaAcquistata),prezzoTotale:pp(o.prezzoTotale),costoPerUnita:pp(o.costoPerUnita),qtaUsata:pp(o.qtaUsata),stockResiduo:pp(o.stockResiduo),valoreStock:pp(o.valoreStock)};});}
  if(cP&&cC&&cO&&cR&&cM){ss('ok','✓ Dati in cache');renderAll();}
  // Fetch batch in background (1 sola chiamata)
  try{
    const all=await get('getAllAdmin');
    if(!all||all.error)throw new Error(all?.error||'Risposta non valida');
    const pr=all.products, cl=all.clients, or=all.orders, ric=all.ricette, mp=all.mp;
    if(pr){products=rows2obj(pr,PROD_H).map(p=>({...p,price:pp(p.price),avail:String(p.avail).toLowerCase()==='true',qty:parseInt(p.qty)||0,preorder:String(p.preorder).toLowerCase()==='true',waitTime:String(p.waitTime||'')}));saveCache('ma_cp',pr);localStorage.removeItem('ma_cp_v');saveCache('ma_cp',pr);}
    if(cl){clients=rows2obj(cl,CLIE_H);saveCache('ma_cc',cl);}
    if(or){orders=rows2obj(or,ORDI_H).map(o=>({...o,total:pp(o.total),items:(()=>{try{return JSON.parse(o.itemsJson||'[]');}catch{return[];}})()}));saveCache('ma_co',or);}
    if(ric&&ric.length>1){const rH=ric[0].map(h=>String(h).trim());ricette=ric.slice(1).filter(r=>r[0]).map(row=>{const o={};rH.forEach((h,i)=>{o[h]=row[i]!==undefined?row[i]:'';});return{...o,qtyPerVassoio:pp(o.qtyPerVassoio)};});saveCache('ma_cr',ric);}
    if(mp&&mp.length>1){const mH=mp[0].map(h=>String(h).trim());materiePrime=mp.slice(1).filter(r=>r[0]).map(row=>{const o={};mH.forEach((h,i)=>{o[h]=row[i]!==undefined?row[i]:'';});return{...o,qtaAcquistata:pp(o.qtaAcquistata),prezzoTotale:pp(o.prezzoTotale),costoPerUnita:pp(o.costoPerUnita),qtaUsata:pp(o.qtaUsata),stockResiduo:pp(o.stockResiduo),valoreStock:pp(o.valoreStock)};});saveCache('ma_cm',mp);}
    ss('ok','✓ Sincronizzato');renderAll();
  }catch(e){
    if(!cP)ss('err','⚠ Errore connessione');
    else ss('ok','✓ Dati in cache (offline)');
    renderAll();
  }
}

async function saveProd(){
  localStorage.removeItem('ma_cp');
  localStorage.removeItem('ma_cc');
  localStorage.removeItem('ma_co');
  localStorage.removeItem('ma_cache_prod');
  ss('loading','⟳ Salvataggio...');
  try{
    const rows=obj2rows(products.map(p=>({...p,avail:String(p.avail),price:String(p.price),qty:String(p.qty||0),preorder:String(p.preorder||false),waitTime:String(p.waitTime||'')})),PROD_H);
    await post('saveProducts',rows);ss('ok','✓ Salvato');
    await loadAll(true);
  }catch{ss('err','⚠ Errore');}
}
async function saveClie(){
  ss('loading','⟳ Salvataggio...');
  try{await post('saveClients',obj2rows(clients,CLIE_H));ss('ok','✓ Salvato');}catch{ss('err','⚠ Errore');}
}
async function saveOrd(){
  ss('loading','⟳ Salvataggio...');
  try{
    const rows=obj2rows(orders.map(o=>({...o,itemsJson:JSON.stringify(o.items||[])})),ORDI_H);
    await post('saveOrders',rows);ss('ok','✓ Salvato');
  }catch{ss('err','⚠ Errore');}
}

function sw(tab){
  ['c','cl','o','g'].forEach(t=>{
    document.getElementById('v-'+t).style.display=t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });renderAll();
}
function utl(){
  const a=products.filter(p=>p.avail).length,pend=orders.filter(o=>o.status==='pending').length,preord=orders.filter(o=>o.status==='preorder').length,alertCount=pend+preord;
  document.getElementById('tab-c').textContent=`Catalogo (${a}/${products.length})`;
  document.getElementById('tab-cl').textContent=`Clienti (${clients.length})`;
  document.getElementById('tab-o').textContent=alertCount>0?`Ordini ⚠ ${alertCount}`:`Ordini (${orders.length})`;
  document.getElementById('tab-g').textContent='Gestionale';
}
function renderAll(){utl();renderC();renderCl();renderO();renderG();}

function renderC(){
  const s=(document.getElementById('cs')||{}).value||'';
  const f=(document.getElementById('cf')||{}).value||'all';
  const fil=products.filter(p=>p.name.toLowerCase().includes(s.toLowerCase())&&(f==='all'||(f==='si'?p.avail:!p.avail)));
  const a=products.filter(p=>p.avail).length;
  document.getElementById('v-c').innerHTML=`
    <div class="topbar">
      <div><div class="sh">Catalogo Prodotti</div><div style="font-size:13px;color:var(--ts)"><strong style="color:var(--g)">${a}</strong> attivi · ${products.length} totali</div></div>
      <button class="btn btn-p" onclick="newP()">+ Nuovo</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input class="input" id="cs" placeholder="🔍 Cerca..." value="${esc(s)}" oninput="renderC()" style="flex:1">
      <select class="input" id="cf" onchange="renderC()" style="width:auto">
        <option value="all" ${f==='all'?'selected':''}>Tutti</option>
        <option value="si" ${f==='si'?'selected':''}>Disponibili</option>
        <option value="no" ${f==='no'?'selected':''}>Non disp.</option>
      </select>
    </div>
    ${fil.length===0?`<div class="card empty">Nessun prodotto trovato</div>`:''}
    ${fil.map(p=>`
      <div class="card row" style="opacity:${p.avail?1:.6}">
        <button class="toggle" style="background:${p.avail?'#5c8a3c':'#ccc'}" onclick="togP('${esc(p.id)}')">
          <span class="knob" style="left:${p.avail?19:3}px"></span>
        </button>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600">${esc(p.name)}</div>
          ${p.desc?`<div style="font-size:12px;color:var(--ts);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.desc)}</div>`:''}
        </div>
        <div style="text-align:right;min-width:70px">
          <div style="font-size:15px;font-weight:700">€${p.price}</div>
          <div style="font-size:11px;color:var(--ts)">/${esc(p.unit)}</div>
          <div style="font-size:11px;font-weight:700;color:${(p.qty||0)>0?'#5c8a3c':'#e53935'}">${(p.qty||0)>0?p.qty+' disp.':'esaurito'}</div>
          ${p.preorder?'<div style="font-size:10px;color:var(--purple);font-weight:700">📋 pre-ord.</div>':''}
        </div>
        <span style="font-size:10px;font-family:monospace;background:#eee;padding:2px 7px;border-radius:99px;color:#555;white-space:nowrap">${esc(p.id)}</span>
        <button class="btn btn-s" onclick="editP('${esc(p.id)}')" style="padding:6px 10px">✏️</button>
        <button class="btn btn-d" onclick="delP('${esc(p.id)}')" style="padding:6px 10px">🗑</button>
      </div>`).join('')}`;
}

function renderCl(){
  document.getElementById('v-cl').innerHTML=`
    <div class="topbar">
      <div><div class="sh">Clienti</div><div style="font-size:13px;color:var(--ts)">${clients.length} registrati</div></div>
      <button class="btn btn-p" onclick="newCl()">+ Nuovo cliente</button>
    </div>
    ${clients.length===0?`<div class="card empty"><div style="font-size:32px;margin-bottom:8px">👥</div>Nessun cliente ancora.</div>`:''}
    ${clients.map(c=>{
      const n=orders.filter(o=>o.clientId===c.id).length,m=maps(c.address);
      return `<div class="card">
        <div class="row" style="margin-bottom:${c.address||c.phone?8:0}px">
          <div style="flex:1">
            <div style="font-weight:700;font-size:15px">${esc(c.restaurant)}</div>
            ${c.contact?`<div style="font-size:13px;color:var(--tm)">${esc(c.contact)}</div>`:''}
          </div>
          <span class="tag" style="background:#5c8a3c22;color:var(--g)">${n} ordini</span>
          <button class="btn btn-g" onclick="detCl('${esc(c.id)}')" style="padding:5px 9px;font-size:16px">👁</button>
          <button class="btn btn-s" onclick="editCl('${esc(c.id)}')" style="padding:5px 9px">✏️</button>
          <button class="btn btn-d" onclick="delCl('${esc(c.id)}')" style="padding:5px 9px">🗑</button>
        </div>
        ${c.address||c.phone?`<div style="font-size:13px;color:var(--tm);margin-bottom:8px;display:flex;gap:16px;flex-wrap:wrap">
          ${c.address?`<span>📍 ${esc(c.address)} ${m?`<a href="${esc(m)}" target="_blank" style="color:var(--g);font-weight:700">→ Maps</a>`:''}</span>`:''}
          ${c.phone?`<span>📞 ${esc(c.phone)}</span>`:''}
        </div>`:''}
        <div style="background:var(--bg-h);border-radius:6px;padding:6px 10px;display:flex;align-items:center;gap:8px;font-size:12px">
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ts)">
            🔗 faberrunner.github.io/MiniAgricola/ORDINE.html?id=<strong style="color:#333">${esc(c.token)}</strong>
          </span>
          <button class="btn btn-g" onclick="cpL('${esc(c.token)}',this)" style="font-size:12px;padding:2px 8px">Copia</button>
        </div>
      </div>`;
    }).join('')}`;
}

function renderO(){
  const f=(document.getElementById('of')||{}).value||'all';
  const pend=orders.filter(o=>o.status==='pending').length;
  const sorted=[...orders].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const fil=f==='all'?sorted:sorted.filter(o=>o.status===f);
  const SL={pending:'In attesa',confirmed:'Confermato',delivered:'Consegnato',cancelled:'Annullato',preorder:'📋 Pre-ordine'};
  const SC={pending:'#f59e0b',confirmed:'#5c8a3c',delivered:'#888',cancelled:'#e53935',preorder:'#7c3aed'};
  document.getElementById('v-o').innerHTML=`
    <div class="topbar">
      <div><div class="sh">Ordini</div>
        <div style="font-size:13px;color:${pend>0?'#f59e0b':'#888'};font-weight:${pend>0?700:400}">
          ${pend>0?`⚠ ${pend} in attesa`:'Nessun ordine in attesa'}
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">

async function updS(id,status){

      const cl=clients.find(c=>c.id===ord.clientId);

          preorder:i.preorder===true||i.preorder==='true',
          omaggio:i.omaggio===true||i.omaggio==='true'
        }));
        const realTotal=allItems.filter(i=>!i.omaggio).reduce((s,i)=>s+Math.round(i.qty*i.price*100)/100,0);
        const d=encodeURIComponent(JSON.stringify({
          restaurant:ord.restaurant,total:realTotal.toFixed(2),
          note:ord.note||'',clientEmail,orderId:ord.id,items:allItems
        }));
        fetch(API+'?action=notify&d='+d+'&t='+Date.now()).catch(()=>{});
      }
    }
  }
}

function calcolaCostoVassoi(semeMP, semeQtyTot, nVassoi){
  let costo=0;
  const mpVasch=materiePrime.find(m=>m.codice==='MA042642');
  const mpTerr=materiePrime.find(m=>m.codice==='MA042644');
  const mpSeme=materiePrime.find(m=>m.codice===semeMP);
  if(mpVasch&&mpVasch.costoPerUnita) costo+=parseFloat(mpVasch.costoPerUnita||0)*nVassoi;
  if(mpTerr&&mpTerr.costoPerUnita) costo+=parseFloat(mpTerr.costoPerUnita||0)*(400*nVassoi);
  if(mpSeme&&mpSeme.costoPerUnita) costo+=parseFloat(mpSeme.costoPerUnita||0)*parseFloat(semeQtyTot||0);
  return costo;
}

function calcolaMaxVassoi(semeMP, qtyPerVassoio){
  const mpVasch=materiePrime.find(m=>m.codice==='MA042642');
  const mpTerr=materiePrime.find(m=>m.codice==='MA042644');
  const mpSeme=materiePrime.find(m=>m.codice===semeMP);
  // Calcola quanti vassoi può produrre ogni materia prima
  const maxVasch=mpVasch?Math.floor(parseFloat(mpVasch.stockResiduo||0)):0;
  const maxTerr=mpTerr?Math.floor(parseFloat(mpTerr.stockResiduo||0)/400):0;
  const maxSeme=(mpSeme&&qtyPerVassoio>0)?Math.floor(parseFloat(mpSeme.stockResiduo||0)/parseFloat(qtyPerVassoio)):0;
  // Il massimo producibile è il minimo tra le tre
  return Math.min(maxVasch, maxTerr, maxSeme);
}

function onGProdChange(){
  const nome=document.getElementById('g-prod')?.value;
  const nStr=document.getElementById('g-vassoi')?.value;
  const n=parseInt(nStr)||0;
  const prev=document.getElementById('g-preview');
  const btn=document.getElementById('g-confirm');
  if(!nome||n<=0){if(prev)prev.style.display='none';if(btn)btn.disabled=true;return;}
  const ric=ricette.find(r=>r.nomeApp===nome);
  if(!ric){if(prev)prev.style.display='none';if(btn)btn.disabled=true;return;}
  const semeQty=(ric.qtyPerVassoio*n).toFixed(1);
  const terrenoQty=(400*n);
  const vaschetteQty=n;
  // Trova stock MP
  const mpSeme=materiePrime.find(m=>m.codice===ric.semeMP);
  const mpVasch=materiePrime.find(m=>m.codice==='MA042642');
  const mpTerr=materiePrime.find(m=>m.codice==='MA042644');
  const okSeme=!mpSeme||(mpSeme.stockResiduo>=parseFloat(semeQty));
  const okVasch=!mpVasch||(mpVasch.stockResiduo>=vaschetteQty);
  const okTerr=!mpTerr||(mpTerr.stockResiduo>=terrenoQty);
  const allOk=okSeme&&okVasch&&okTerr;
  if(prev){
    prev.style.display='block';
    prev.innerHTML=`<div style="margin-bottom:8px;font-weight:600">Preview produzione — ${n} vasoio${n>1?'i':''}:</div>

async function confermaOmaggio(orderId){
  const nome=document.getElementById('om-prod')?.value;
  const qty=parseInt(document.getElementById('om-qty')?.value)||0;
  if(!nome||qty<=0){alert('Seleziona un prodotto e inserisci la quantità.');return;}
  const order=orders.find(o=>o.id===orderId);
  if(!order)return;
  // Aggiungi item omaggio all'ordine
  const omItem={name:nome,qty,price:0,omaggio:true};
  const updItems=[...(order.items||[]),omItem];
  orders=orders.map(o=>o.id===orderId?{...o,items:updItems,itemsJson:JSON.stringify(updItems)}:o);
  cm();renderAll();await saveOrd();
  ss('ok','🎁 Omaggio aggiunto');
}

// ── GESTIONE PRE-ORDINE ──────────────────────────────────────
async function handlePreordine(id){
  const order=orders.find(o=>o.id===id);
  if(!order)return;
  const preItems=(order.items||[]).filter(i=>i.preorder===true||i.preorder==='true');
  // Annulla ordine originale — Apps Script ripristina lo stock
  orders=orders.map(o=>o.id===id?{...o,status:'cancelled'}:o);
  // Crea nuovo ordine con soli pre-ordini se presenti
  if(preItems.length>0){
    const preTotal=preItems.reduce((s,i)=>s+Math.round(parseFloat(i.qty||0)*parseFloat(i.price||0)*100)/100,0);
    const preOrd={id:'PRE-'+Date.now(),clientId:order.clientId,restaurant:order.restaurant,itemsJson:JSON.stringify(preItems),items:preItems,total:preTotal,note:order.note||'',status:'preorder',createdAt:new Date().toISOString()};
    orders=[...orders,preOrd];
  }
  renderAll();await saveOrd();
}

// ── AUTENTICAZIONE ADMIN ─────────────────────────────────────
const ADMIN_HASH='bbfdb4e5daf324f5ea4abc7b089f915d90cc0b9dcad2806d0d1faa17116c8fc9';

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function showAuth(){
  document.getElementById('auth-overlay').style.display='flex';
  document.querySelector('.header').style.display='none';
  document.querySelector('.nav').style.display='none';
  document.querySelector('.body').style.display='none';
}
function hideAuth(){
  document.getElementById('auth-overlay').style.display='none';
  document.querySelector('.header').style.display='';
  document.querySelector('.nav').style.display='';
  document.querySelector('.body').style.display='';
}
async function doAuth(){
  const pwd=document.getElementById('auth-pwd').value;
  if(!pwd)return;
  const h=await sha256(pwd);
  if(h===ADMIN_HASH){
    sessionStorage.setItem('ma_auth','1');
    document.getElementById('auth-err').style.display='none';
    hideAuth();
    loadAll(false);
  }else{
    document.getElementById('auth-err').style.display='block';
    document.getElementById('auth-pwd').value='';
    document.getElementById('auth-pwd').focus();
  }
}
function doLogout(){
  sessionStorage.removeItem('ma_auth');
  showAuth();
  document.getElementById('auth-pwd').value='';
}
function checkAuth(){
  if(!sessionStorage.getItem('ma_auth')){
    showAuth();
    return false;
  }
  return true;
}


// ── ELIMINA SINGOLO ORDINE ───────────────────────────────────
async function deleteOrder(id){
  const o=orders.find(x=>x.id===id);
  if(!o)return;
  if(!confirm('Eliminare ordine '+id+'\n'+o.restaurant+'?\n\nL\'operazione è irreversibile.'))return;
  orders=orders.filter(x=>x.id!==id);
  renderAll();
  await saveOrd();
  ss('ok','✓ Ordine eliminato');
}
