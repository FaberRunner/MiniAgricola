<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MiniAgricola — Catalogo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
:root{--g:#4a7a2e;--gl:#f0f7eb;--d:#1a1a1a;--m:#888;--b:#e8e8e8;--bg:#fafaf8}
body{background:var(--bg);color:var(--d);font-size:14px;min-height:100vh;padding-bottom:80px}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:50;padding:6px 16px;display:flex;align-items:center;justify-content:space-between}

/* SEARCH */
.searchbar{padding:10px 16px;background:#fff;border-bottom:1px solid var(--b)}

/* BODY */
.body{padding:0 12px;max-width:700px;margin:0 auto}

/* CATEGORIE */
.catsec{margin-top:8px}
.cattl{font-size:18px;font-weight:900;color:#1a2e1a;text-transform:uppercase;letter-spacing:1px;padding:24px 16px 12px;display:flex;align-items:center;gap:10px}
.cattl::after{content:'';flex:1;height:1px;background:var(--b)}
.csec{display:flex;align-items:center;gap:10px;padding:24px 16px 12px}
.cemi{font-size:22px}
.cname{font-size:18px;font-weight:900;letter-spacing:1px;color:#1a2e1a;text-transform:uppercase}
.cgrp{font-size:13px;font-weight:700;color:#5c8a3c;letter-spacing:0.5px;padding:10px 16px 4px;border-left:3px solid #5c8a3c;margin:8px 0 2px 8px}

/* GRIGLIA */
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:500px){.pgrid{grid-template-columns:repeat(3,1fr)}}

/* CARD */
.pcard{background:#fff;border-radius:12px;border:1px solid var(--b);overflow:hidden;display:flex;flex-direction:column}
.pcard.na{opacity:.5}
.pimg{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:48px;background:var(--gl)}
.pimg-real{padding:0;overflow:hidden;background:#fff}
.pinfo{padding:10px 10px 12px}
.pname{font-weight:700;font-size:13px;line-height:1.3;margin-bottom:3px}
.pprice{font-size:13px;font-weight:800;color:var(--g)}
.punit{font-size:11px;color:var(--m)}
.pdesc{font-size:11px;color:#666;margin-top:2px;line-height:1.4;word-break:break-word}
.nalbl{font-size:11px;color:var(--m);padding:6px 10px 10px;text-align:center;font-style:italic}
.preorder-lbl{font-size:11px;color:#6A1B9A;font-weight:600;padding:4px 10px 10px;text-align:center}
.pimg-clickable{cursor:pointer;transition:opacity .15s;touch-action:manipulation;-webkit-tap-highlight-color:rgba(106,27,154,.15)}
.pimg-clickable:active{opacity:.75}

/* INFO BAR */
.infobar{background:#f0f7eb;border-bottom:1px solid #d4eac4;padding:8px 16px;font-size:12px;color:#4a7a2e;font-weight:600;text-align:center}

/* WA CTA */
.wa-cta{margin:24px 16px 8px;padding:14px 18px;background:#25D366;border-radius:14px;display:flex;align-items:center;gap:12px;text-decoration:none;box-shadow:0 2px 8px rgba(37,211,102,.25)}
.wa-cta-txt{flex:1;color:#fff}
.wa-cta-txt strong{display:block;font-size:14px;font-weight:800}
.wa-cta-txt span{font-size:12px;opacity:.9}

/* POPUP DETTAGLIO */
#prod-detail-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center}
#prod-detail-overlay.open{display:flex}
#prod-detail-panel{background:var(--bg,#fff);width:100%;max-width:540px;max-height:88vh;border-radius:22px 22px 0 0;overflow-y:auto;padding-bottom:32px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.pd-img{width:100%;height:260px;object-fit:cover;object-position:top center;display:block}
.pd-img-emoji{width:100%;height:220px;display:flex;align-items:center;justify-content:center;font-size:80px;background:#f5f0ff}
.pd-body{padding:20px}
.pd-name{font-size:24px;font-weight:900;color:#6A1B9A;margin-bottom:4px}
.pd-price{font-size:15px;font-weight:700;color:#4CAF50;margin-bottom:6px}
.pd-desc{font-size:13px;color:#666;margin-bottom:14px;line-height:1.5;font-style:italic}
.pd-section{font-size:11px;font-weight:900;letter-spacing:1.5px;color:#1a2e1a;text-transform:uppercase;margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid #e8f5e9}
.pd-item{font-size:14px;color:#1a1a1a;padding:4px 0 4px 18px;position:relative;line-height:1.5}
.pd-item::before{content:'·';position:absolute;left:4px;color:#4CAF50;font-weight:900;font-size:16px}
.pd-empty{font-size:13px;color:#aaa;font-style:italic;text-align:center;padding:20px 0}
.pd-hdr{display:flex;justify-content:flex-end;align-items:center;padding:12px 16px;position:absolute;top:0;right:0;z-index:10}
.pd-close{background:none;border:none;font-size:24px;cursor:pointer;color:#888;line-height:1}

/* WA nel popup */
.pd-wa{display:flex;align-items:center;gap:10px;background:#25D366;color:#fff;text-decoration:none;border-radius:12px;padding:12px 16px;margin-top:20px}
.pd-wa-txt{flex:1;font-size:13px}
.pd-wa-txt strong{display:block;font-weight:800;font-size:14px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center}
#loading img{width:200px;height:auto;margin-bottom:28px;animation:pulse 1.5s ease-in-out infinite}
.spin{width:18px;height:18px;border:2.5px solid #5c8a3c;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite}
</style>

</div>

let products=[];
let _searchQuery='';

function pp(v){return typeof v==='number'?v:parseFloat(String(v||0).replace(',','.'))||0;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function init(){
  try{
    const r=await fetch(API+'?action=getAllClient&t='+Date.now());
    const all=await r.json();
    if(all&&!all.error&&all.products&&all.products.length>1){
      const H=all.products[0].map(h=>String(h).trim());
      products=all.products.slice(1).filter(row=>row[0]).map(row=>{
        const o={};H.forEach((h,i)=>{o[h]=row[i]!==undefined?row[i]:'';});
        return {
          id:String(o.id),name:String(o.name),desc:String(o.desc||''),
          price:pp(o.price),avail:String(o.avail).toLowerCase()==='true',
          unit:String(o.unit||'vassoio'),qty:parseInt(o.qty)||0,
          preorder:String(o.preorder).toLowerCase()==='true',
          waitTime:String(o.waitTime||''),
          caratteristiche:String(o.caratteristiche||''),
          uso:String(o.uso||'')
        };
      });
    }
  }catch(e){console.error('Errore caricamento prodotti:',e);}
  renderCat();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
}

function filterCat(q){
  _searchQuery=(q||'').trim().toLowerCase();
  document.getElementById('searchclear').style.display=_searchQuery?'block':'none';
  renderCat();
  window.scrollTo({top:0,behavior:'smooth'});
}

function clearSearch(){
  _searchQuery='';
  document.getElementById('searchinp').value='';
  document.getElementById('searchclear').style.display='none';
  renderCat();
}

function pimgHtml(p){
  const em=EMO[p.id]||'🌿';
  const bg=BG[p.id]||'#f1f8e9';
  const src=IMGS[p.id];
  const pid='data-prodid="'+p.id+'"';
  if(src) return '<div class="pimg pimg-real pimg-clickable" '+pid+'><img src="'+src+'" alt="'+esc(p.name)+'" style="width:100%;height:100%;object-fit:cover;display:block;pointer-events:none" loading="lazy"></div>';
  return '<div class="pimg pimg-clickable" style="background:'+bg+';font-size:52px;pointer-events:none" '+pid+'>'+em+'</div>';
}

function renderProds(prods){
  let h='';
  prods.forEach(p=>{
    if(p.avail&&(p.qty||0)>0){
      h+=`<div class="pcard">
        ${pimgHtml(p)}
        <div class="pinfo">
          <div class="pname">${esc(p.name)}</div>
          <div><span class="pprice">€${p.price}</span> <span class="punit">/ ${esc(p.unit)}</span></div>
          ${p.desc?`<div class="pdesc">${esc(p.desc)}</div>`:''}
        </div>
      </div>`;
    }else if(p.avail&&p.preorder){
      h+=`<div class="pcard">
        ${pimgHtml(p)}
        <div class="pinfo">
          <div class="pname">${esc(p.name)}</div>
          <div><span class="pprice">€${p.price}</span> <span class="punit">/ ${esc(p.unit)}</span></div>
          ${p.desc?`<div class="pdesc">${esc(p.desc)}</div>`:''}
        </div>
        <div class="preorder-lbl">📋 Pre-ordine${p.waitTime?' · '+esc(p.waitTime):''}</div>
      </div>`;
    }else{
      h+=`<div class="pcard na">
        ${pimgHtml(p)}
        <div class="pinfo">
          <div class="pname">${esc(p.name)}</div>
          <div><span class="pprice">€${p.price}</span> <span class="punit">/ ${esc(p.unit)}</span></div>
          ${p.desc?`<div class="pdesc">${esc(p.desc)}</div>`:''}
        </div>
        <div class="nalbl">Non disponibile</div>
      </div>`;
    }
  });
  return h;
}

function renderCat(){
  const pm={};products.forEach(p=>pm[p.id]=p);
  const sq=_searchQuery;
  let h='';

  CATS.forEach(cat=>{
    if(cat.groups){
      const visGroups=cat.groups.map(g=>({
        ...g,
        prods:g.ids.map(id=>pm[id]).filter(p=>{
          if(!p)return false;
          if(!sq)return true;
          return (p.name||'').toLowerCase().includes(sq)||(p.desc||'').toLowerCase().includes(sq);
        })
      })).filter(g=>g.prods.length>0);
      if(!visGroups.length)return;
      h+=`<div class="csec"><span class="cemi">${cat.emoji}</span><span class="cname">${esc(cat.name)}</span></div>`;
      visGroups.forEach(g=>{
        if(g.name) h+=`<div class="cgrp">${esc(g.name)}</div>`;
        h+='<div class="pgrid">'+renderProds(g.prods)+'</div>';
      });
      return;
    }
    const cp=cat.ids.map(id=>pm[id]).filter(p=>{
      if(!p)return false;
      if(!sq)return true;
      return (p.name||'').toLowerCase().includes(sq)||(p.desc||'').toLowerCase().includes(sq);
    });
    if(!cp.length)return;
    h+=`<div class="catsec"><div class="cattl">${cat.emoji} ${cat.name}</div><div class="pgrid">`;
    h+=renderProds(cp);
    h+=`</div></div>`;
  });

  if(sq&&!h.includes('pcard')){
    h='<div style="text-align:center;padding:60px 20px;color:var(--m)">'+
      '<div style="font-size:40px;margin-bottom:12px">🔍</div>'+
      '<div style="font-size:16px;font-weight:600">Nessun prodotto trovato</div>'+
      '<div style="font-size:13px;margin-top:6px">per "<strong>'+sq+'</strong>"</div>'+
      '</div>';
  }

  document.getElementById('cat').innerHTML=h;

  // Event delegation per popup
  const catEl=document.getElementById('cat');
  if(catEl&&!catEl._pdListener){
    catEl.addEventListener('click',function(e){
      const el=e.target.closest('.pimg-clickable');
      if(el)openProdDetail(el.dataset.prodid);
    });
    catEl._pdListener=true;
  }
}

function openProdDetail(prodId){
  const p=products.find(x=>x.id===prodId);
  if(!p)return;
  const catSrc=CAT_IMGS[p.id];
  const imgSrc=catSrc||IMGS[p.id];
  const em=EMO[p.id]||'🌿';
  const imgHtml=imgSrc
    ?'<img src="'+imgSrc+'" alt="'+esc(p.name)+'" class="pd-img" loading="eager">'
    :'<div class="pd-img-emoji">'+em+'</div>';
  const desc=(p.desc||'').trim();
  const carat=(p.caratteristiche||'').trim();
  const uso=(p.uso||'').trim();
  const caratItems=carat?carat.replace(/\n/g,'·').split('·').map(s=>s.trim()).filter(Boolean):[];
  const usoItems=uso?uso.replace(/\n/g,'·').split('·').map(s=>s.trim()).filter(Boolean):[];

  let html=imgHtml+'<div class="pd-body">';
  html+='<div class="pd-name">'+esc(p.name)+'</div>';
  html+='<div class="pd-price">€'+p.price+' / '+esc(p.unit)+'</div>';
  if(desc)html+='<div class="pd-desc">'+esc(desc)+'</div>';
  if(caratItems.length){
    html+='<div class="pd-section">Caratteristiche</div>';
    caratItems.forEach(s=>{html+='<div class="pd-item">'+esc(s)+'</div>';});
  }
  if(usoItems.length){
    html+='<div class="pd-section">Consigli d\'uso</div>';
    usoItems.forEach(s=>{html+='<div class="pd-item">'+esc(s)+'</div>';});
  }
  if(!desc&&!carat&&!uso){
    html+='<div class="pd-empty">🌱 Scheda in preparazione</div>';
  }
  // WA CTA nel popup
  html+=`<a href="https://wa.me/393757350178?text=${encodeURIComponent('Ciao! Sono interessato a '+p.name+' — €'+p.price+'/'+p.unit)}" target="_blank" class="pd-wa">
    <span style="font-size:22px">💬</span>
    <div class="pd-wa-txt">
      <strong>Vuoi ordinare ${esc(p.name)}?</strong>
      <span style="font-size:12px;opacity:.9">Scrivici su WhatsApp →</span>
    </div>
  </a>`;
  html+='</div>';

  document.getElementById('pd-content').innerHTML=html;
  document.getElementById('prod-detail-overlay').classList.add('open');
}

function closeProdDetail(){
  document.getElementById('prod-detail-overlay').classList.remove('open');
}

init();
</script>
